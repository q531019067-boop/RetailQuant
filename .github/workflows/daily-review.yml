name: daily-review

on:
  schedule:
    - cron: "0 7 * * 1-5"  # UTC 07:00 = CST 15:00, Mon-Fri（GitHub 调度会有 0-60min 延迟，预期 ~15:00-16:00 CST 执行）
  workflow_dispatch:        # 手动触发

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install CJK fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run daily review
        run: uv run python scripts/review.py

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: review-${{ github.run_id }}
          name: "复盘报告 — $(date +%Y-%m-%d)"
          body: "rQuant 每日量化复盘报告（$(date +%Y-%m-%d)），由 GitHub Actions 自动生成。"
          files: |
            reports/$(date +%Y-%m-%d).json
            reports/$(date +%Y-%m-%d).html
            reports/$(date +%Y-%m-%d).pdf
            reports/$(date +%Y-%m-%d).png
            reports/$(date +%Y-%m-%d).typ
          fail_on_unmatched_files: false
