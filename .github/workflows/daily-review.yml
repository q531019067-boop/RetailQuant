name: daily-review

on:
  schedule:
    - cron: "0 7 * * 1-5"  # UTC 07:00 = CST 15:00, Mon-Fri（GitHub 调度会有 0-60min 延迟，预期 ~15:00-16:00 CST 执行）
  workflow_dispatch:        # 手动触发

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run daily review
        run: uv run python scripts/review.py

      - name: Set release metadata
        id: meta
        run: |
          echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: review-${{ github.run_id }}
          name: 复盘报告 — ${{ steps.meta.outputs.date }}
          body: |
            rQuant 每日量化复盘报告（${{ steps.meta.outputs.date }}），由 GitHub Actions 自动生成。

            ### 文件说明
            - `.json` — 原始数据
            - `.typ` — Typst 源码
            - `.html` — 网页
            - `.pdf` — PDF 报告
            - `.png` — 预览图
          files: |
            reports/${{ steps.meta.outputs.date }}.json
            reports/${{ steps.meta.outputs.date }}.pdf
            reports/${{ steps.meta.outputs.date }}.png
            reports/${{ steps.meta.outputs.date }}.typ
          fail_on_unmatched_files: false
